id = "HopCoderX"
name = "HopCoderX"
description = "The open source coding agent."
version = "1.2.10"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/TaimoorSiddiquiOfficial/hopcoderx"

[agent_servers.HopCoderX]
name = "HopCoderX"
icon = "./icons/HopCoderX.svg"

[agent_servers.HopCoderX.targets.darwin-aarch64]
archive = "https://github.com/TaimoorSiddiquiOfficial/hopcoderx/releases/download/v1.2.10/HopCoderX-darwin-arm64.zip"
