args = ["acp"]

[agent_servers.HopCoderX.targets.darwin-x86_64]
archive = "https://github.com/TaimoorSiddiquiOfficial/hopcoderx/releases/download/v1.2.10/HopCoderX-darwin-x64.zip"
cmd = "./HopCoderX"
args = ["acp"]

[agent_servers.HopCoderX.targets.linux-aarch64]
archive = "https://github.com/TaimoorSiddiquiOfficial/hopcoderx/releases/download/v1.2.10/HopCoderX-linux-arm64.tar.gz"
cmd = "./HopCoderX"
args = ["acp"]

[agent_servers.HopCoderX.targets.linux-x86_64]
archive = "https://github.com/TaimoorSiddiquiOfficial/hopcoderx/releases/download/v1.2.10/HopCoderX-linux-x64.tar.gz"
cmd = "./HopCoderX"
args = ["acp"]

[agent_servers.HopCoderX.targets.windows-x86_64]
