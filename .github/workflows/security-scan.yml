name: Security Scan

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  osv-scanner:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OSV-Scanner
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest
        env:
          GOBIN: /usr/local/bin

      - name: Run OSV-Scanner
        run: osv-scanner scan --recursive --format table .
        continue-on-error: true

      - name: Run OSV-Scanner (SARIF)
        if: ${{ !cancelled() }}
        run: osv-scanner scan --recursive --format sarif --output osv-results.sarif .
        continue-on-error: true

      - name: Upload SARIF results
        if: ${{ !cancelled() && hashFiles('osv-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
