name: Build & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true
        type: string
        default: "1.0.0"
      channel:
        description: "npm dist-tag"
        required: false
        type: choice
        options:
          - latest
          - beta
        default: latest
      skip_cli:
        description: "Skip CLI build + publish"
        type: boolean
        default: false
      skip_sdk:
        description: "Skip SDK publish"
        type: boolean
        default: false
      skip_plugin:
        description: "Skip Plugin publish"
        type: boolean
        default: false

concurrency:
  group: build-publish
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  HOPCODERX_VERSION: ${{ inputs.version }}
  HOPCODERX_CHANNEL: ${{ inputs.channel || 'latest' }}

jobs:
  # ─── Build CLI Binaries (all platforms on single runner) ────────────
  build-cli:
    if: ${{ !inputs.skip_cli }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun

      - name: Build CLI (all platforms)
        working-directory: packages/hopcoderx
        run: bun run script/build.ts

      - uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: packages/hopcoderx/dist/
          retention-days: 3

  # ─── Publish CLI to npm ─────────────────────────────────────────────
  publish-cli:
    if: ${{ !inputs.skip_cli }}
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun

      - uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: packages/hopcoderx/dist/

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish platform binaries to npm
        working-directory: packages/hopcoderx
        run: |
          TAG="${{ inputs.channel || 'latest' }}"
          for dir in dist/hopcoderx-*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $(basename $dir)..."
              cd "$dir"
              npm publish --access public --tag "$TAG" || echo "Failed: $dir"
              cd - > /dev/null
            fi
          done

      - name: Build and publish wrapper package (hopcoderx-ai)
        working-directory: packages/hopcoderx
        run: |
          VERSION="${{ inputs.version }}"
          TAG="${{ inputs.channel || 'latest' }}"

          # Collect platform binary names + versions
          DEPS=$(bun -e "
            const deps = {}
            for (const fp of new Bun.Glob('dist/hopcoderx-*/package.json').scanSync()) {
              const p = await Bun.file(fp).json()
              deps[p.name] = p.version
            }
            console.log(JSON.stringify(deps))
          ")
          echo "Platform deps: $DEPS"

          # Create wrapper package
          mkdir -p dist/wrapper
          cat > dist/wrapper/package.json <<EOF
          {
            "name": "hopcoderx-ai",
            "version": "${VERSION}",
            "description": "HopCoderX CLI - AI-powered development tool",
            "license": "MIT",
            "bin": { "hopcoderx": "./bin/hopcoderx" },
            "scripts": { "postinstall": "bun ./postinstall.mjs || node ./postinstall.mjs" },
            "optionalDependencies": ${DEPS}
          }
          EOF

          cp -r bin dist/wrapper/bin
          cp script/postinstall.mjs dist/wrapper/postinstall.mjs
          cp ../../LICENSE dist/wrapper/LICENSE

          cd dist/wrapper
          npm publish --access public --tag "$TAG" || echo "Failed: wrapper"

      - name: Create GitHub Release
        run: |
          VERSION="${{ inputs.version }}"
          cd packages/hopcoderx

          # Archive binaries
          for dir in dist/hopcoderx-linux-*/; do
            [ -d "$dir/bin" ] && tar -czf "dist/$(basename $dir).tar.gz" -C "$dir/bin" .
          done
          for dir in dist/hopcoderx-darwin-* dist/hopcoderx-windows-*/; do
            [ -d "$dir/bin" ] && (cd "$dir/bin" && zip -r "../../$(basename $dir).zip" .)
          done

          # Create release with assets
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip 2>/dev/null \
            || echo "Release creation skipped or already exists"
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Publish SDK (@hopcoderx/sdk) ──────────────────────────────────
  publish-sdk:
    if: ${{ !inputs.skip_sdk }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Build and publish @hopcoderx/sdk
        run: |
          bun run packages/sdk/js/script/build.ts
          cd packages/sdk/js
          bun run script/publish.ts

  # ─── Publish Plugin (@hopcoderx/plugin) ────────────────────────────
  publish-plugin:
    if: ${{ !inputs.skip_plugin }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Build and publish @hopcoderx/plugin
        working-directory: packages/plugin
        run: bun run script/publish.ts

  # ─── Finalize ──────────────────────────────────────────────────────
  finalize:
    needs: [publish-cli, publish-sdk, publish-plugin]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag release
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "v${VERSION}"
          git push origin "v${VERSION}" --force || echo "Tag push failed"

      - name: Summary
        run: |
          echo "## Build & Publish Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ inputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Channel** | \`${{ inputs.channel || 'latest' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **CLI (hopcoderx-ai)** | ${{ needs.publish-cli.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **SDK (@hopcoderx/sdk)** | ${{ needs.publish-sdk.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Plugin (@hopcoderx/plugin)** | ${{ needs.publish-plugin.result }} |" >> $GITHUB_STEP_SUMMARY
